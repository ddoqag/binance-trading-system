# HFT Trading System Configuration

# Trading settings
symbol: btcusdt
paper_trading: true
max_position: 1.0
base_order_size: 0.01
heartbeat_ms: 100

# Risk limits
daily_loss_limit: -10000  # $10,000 max daily loss
max_drawdown: 0.15        # 15% max drawdown
max_orders_per_minute: 60
max_order_size: 1.0       # 1 BTC max per order

# RL Agent Configuration
agent:
  state_dim: 12
  action_dim: 1
  hidden_dim: 256
  learning_rate: 0.0003
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  buffer_size: 100000
  batch_size: 64
  target_entropy: -1.0

# Shared memory settings
shm:
  path: /tmp/hft_trading_shm  # Linux/Mac
  # path: .\data\hft_trading_shm  # Windows

# WebSocket settings
websocket:
  base_url: wss://stream.binance.com:9443/ws
  reconnect_delay: 1s
  max_reconnect_delay: 30s
  heartbeat_interval: 30s
  stale_timeout: 60s

# WAL settings
wal:
  log_dir: ./logs/wal
  max_entries: 10000
  checkpoint_interval: 300  # seconds

# Circuit breaker settings
circuit_breaker:
  api_failure_threshold: 5
  api_timeout: 30s
  order_failure_threshold: 3
  order_timeout: 60s
  websocket_failure_threshold: 10
  websocket_timeout: 10s

# Logging
logging:
  level: info
  format: "%(asctime)s [%(name)s] %(levelname)s %(message)s"
  max_size: 10MB
  backup_count: 7

# Self-Evolving Trader Configuration

# Trading Mode: backtest, paper, live
trading_mode: paper

# Trading Pair
symbol: BTCUSDT

# Capital Settings
initial_capital: 10000.0
max_leverage: 3

# Binance API (use environment variables for sensitive data)
api_key: ${BINANCE_API_KEY}
api_secret: ${BINANCE_API_SECRET}
use_testnet: true

# Risk Limits
risk_limits:
  max_single_position_pct: 0.20    # 单笔最大 20%
  max_total_position_pct: 0.80     # 总仓位最大 80%
  max_daily_loss_pct: 0.05         # 日亏损 5%
  max_drawdown_pct: 0.15           # 最大回撤 15%
  stop_loss_pct: 0.025             # 止损 2.5%
  take_profit_pct: 0.05            # 止盈 5%
  max_orders_per_minute: 30        # 每分钟最大订单数

# Phase 1-9 Feature Toggles
phases:
  phase_1_registry: true           # Agent Registry
  phase_2_regime: true             # Regime Detection
  phase_3_evolution: true          # Self-Evolving Meta-Agent
  phase_4_pbt: true                # Population Based Training
  phase_5_real_sim_real: true      # Real-Sim-Real Validation
  phase_6_moe: true                # Mixture of Experts
  phase_7_online_learning: true    # Online Learning
  phase_8_world_model: false       # World Model (compute intensive)
  phase_9_civilization: true       # Agent Civilization

# Runtime Settings
check_interval_seconds: 5.0        # 检查间隔 (秒)
strategy_switch_cooldown: 60.0     # 策略切换冷却 (秒)

# Meta-Agent Settings
meta_agent:
  learning_rate: 0.01
  min_weight: 0.05
  max_weight: 0.8

# PBT Settings
pbt:
  population_size: 10
  mutation_probability: 0.8
  evaluation_window: 20

# Strategy Configuration
strategies:
  # Agent-based strategies (from simplified system migration)
  - name: moving_average
    enabled: true
    weight: 0.18
    agent_class: strategies.moving_average_agent.MovingAverageAgent
    params:
      fast_period: 5
      slow_period: 20
      signal_threshold: 0.001
    suitable_regimes: ["trending"]

  - name: rsi
    enabled: true
    weight: 0.15
    agent_class: strategies.rsi_agent.RSIAgent
    params:
      period: 14
      overbought: 70.0
      oversold: 30.0
    suitable_regimes: ["ranging", "volatile"]

  - name: bollinger_bands
    enabled: true
    weight: 0.20
    agent_class: strategies.bollinger_bands_agent.BollingerBandsAgent
    params:
      period: 20
      std_dev: 2.0
    suitable_regimes: ["ranging", "trending"]

  # Phase 2: New Agent-based strategies
  - name: macd
    enabled: true
    weight: 0.15
    agent_class: strategies.macd_agent.MACDAgent
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9
    suitable_regimes: ["trending"]

  - name: kdj
    enabled: true
    weight: 0.15
    agent_class: strategies.kdj_agent.KDJAgent
    params:
      n_period: 9
      m1: 3
      m2: 3
    suitable_regimes: ["ranging", "volatile"]

  - name: atr
    enabled: true
    weight: 0.10
    agent_class: strategies.atr_agent.ATRAgent
    params:
      period: 14
      multiplier: 2.0
      trend_threshold: 0.02
    suitable_regimes: ["volatile", "trending"]

  - name: ml_ensemble
    enabled: true
    weight: 0.07
    agent_class: strategies.ml_ensemble_agent.MLEnsembleAgent
    params:
      use_rf: true
      use_lr: true
      use_lstm: false
      online_learning: true
      voting_method: weighted
      confidence_threshold: 0.6
    suitable_regimes: ["all"]

  # Original strategies
  - name: volatility_breakout
    enabled: true
    weight: 0.0  # Disabled by default, enable manually
    agent_class: strategies.volatility_breakout.VolatilityBreakoutStrategy
    params:
      atr_period: 14
      channel_multiplier: 2.0
    suitable_regimes: ["volatile"]

  - name: ml_momentum
    enabled: true
    weight: 0.0  # Disabled by default (requires sklearn)
    agent_class: strategies.ml_momentum.MLMomentumStrategy
    params:
      lookback: 50
      min_samples: 100
    suitable_regimes: ["all"]

# Logging
logging:
  level: INFO
  file: logs/self_evolving_trader.log
  max_size_mb: 100
  backup_count: 5
